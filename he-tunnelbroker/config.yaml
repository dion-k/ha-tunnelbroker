name: "HE Tunnelbroker (6in4)"
description: "Establishes a 6in4 IPv6 tunnel to Hurricane Electric's Tunnelbroker service, providing IPv6 connectivity to your Home Assistant host."
version: "1.1.1"
slug: "he-tunnelbroker"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
host_network: true
privileged:
  - NET_ADMIN
  - SYS_MODULE
startup: system
boot: auto
init: false
map: []
url: "https://github.com/dion-k/ha-tunnelbroker"
options:
  server_ipv4: ""
  client_ipv4: "auto"
  server_ipv6: ""
  client_ipv6: ""
  routed_subnet: ""
  tunnel_mtu: 1480
  update_enabled: false
  update_username: ""
  update_key: ""
  update_tunnel_id: ""
  update_interval: 600
  dns_servers:
    - "2001:4860:4860::8888"
    - "2001:4860:4860::8844"
  healthcheck_host: "2001:4860:4860::8888"
  healthcheck_interval: 300
  notify_on_start: false
schema:
  server_ipv4: str
  client_ipv4: str
  server_ipv6: str
  client_ipv6: str
  routed_subnet: str
  tunnel_mtu: "int(1280,1480)"
  update_enabled: bool
  update_username: str
  update_key: password
  update_tunnel_id: str
  update_interval: "int(60,3600)"
  dns_servers:
    - str
  healthcheck_host: str
  healthcheck_interval: "int(60,3600)"
  notify_on_start: bool
